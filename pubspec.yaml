name: finance_copilot
description: "Personal wealth management app — replaces MoneyHistory.xlsx"
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Database (drift + SQLite)
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  sqlite3: any
  sqlite3_flutter_libs: any
  path_provider: ^2.1.5
  path: ^1.9.1

  # Charts
  fl_chart: ^1.2.0

  # File import
  csv: ^8.0.0
  excel:
    git:
      url: https://github.com/justkawal/excel.git
      ref: main
  file_picker: ^10.3.10

  # HTTP (market data)
  dio: ^5.8.0

  # HTML parsing (DOM, not regex)
  html: ^0.15.4

  # Google Sheets (price data via GOOGLEFINANCE, CSV export)
  url_launcher: ^6.3.1

  # Headless WebView (Cloudflare cookie solving for Investing.com)
  flutter_inappwebview: ^6.1.5

  # Google Drive sync
  google_sign_in: ^6.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.0
  googleapis: ^13.0.0
  googleapis_auth: ^2.0.0
  http: ^1.2.0

  # Hashing (import dedup)
  crypto: ^3.0.6

  # Utils
  intl: ^0.20.2
  collection: ^1.19.1
  json_annotation: ^4.9.0
  logging: ^1.3.0
  receive_sharing_intent: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.31.0
  build_runner: ^2.13.1

  # Riverpod code generation
  riverpod_generator: ^4.0.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

  # JSON serialization
  json_serializable: ^6.11.2

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    # Test fixtures — bundled for integration tests (negligible size in release)
    - integration_test/fixtures/
