name: asset_manager
description: "Personal wealth management app — replaces MoneyHistory.xlsx"
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database (drift + SQLite)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Charts
  fl_chart: ^0.70.2

  # File import
  csv: ^6.0.0
  excel:
    git:
      url: https://github.com/justkawal/excel.git
      ref: main
  file_picker: ^9.2.1

  # HTTP (market data)
  dio: ^5.8.0

  # HTML parsing (DOM, not regex)
  html: ^0.15.4

  # Google Sheets (price data via GOOGLEFINANCE, CSV export)
  url_launcher: ^6.3.1

  # Headless WebView (Cloudflare cookie solving for Investing.com)
  flutter_inappwebview: ^6.1.5

  # Hashing (import dedup)
  crypto: ^3.0.6

  # Utils
  intl: ^0.20.2
  collection: ^1.19.1
  json_annotation: ^4.9.0
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Drift code generation
  drift_dev: ^2.25.0
  build_runner: ^2.4.14

  # Riverpod code generation
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

  # JSON serialization
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
