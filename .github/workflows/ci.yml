name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact: FinanceCopilot-macos
          - os: windows-latest
            platform: windows
            artifact: FinanceCopilot-windows
          - os: ubuntu-latest
            platform: linux
            artifact: FinanceCopilot-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release
        run: flutter build ${{ matrix.platform }} --release

      - name: Archive macOS build
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          zip -r FinanceCopilot-macos.zip FinanceCopilot.app

      - name: Archive Linux build
        if: matrix.platform == 'linux'
        run: tar -czf build/FinanceCopilot-linux.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload artifact (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/macos/Build/Products/Release/FinanceCopilot-macos.zip

      - name: Upload artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/windows/x64/runner/Release/

      - name: Upload artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/FinanceCopilot-linux.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Windows zip
        run: |
          cd artifacts/FinanceCopilot-windows
          zip -r ../FinanceCopilot-windows.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/FinanceCopilot-macos/FinanceCopilot-macos.zip
            artifacts/FinanceCopilot-windows.zip
            artifacts/FinanceCopilot-linux/FinanceCopilot-linux.tar.gz
