name: Close stale issues

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          only-issue-labels: 'waiting-for-response'
          days-before-stale: 14
          days-before-close: 7
          stale-issue-message: >-
            This issue has been automatically marked as stale because there has
            been no response for 14 days. It will be closed in 7 days if no
            further activity occurs.
          close-issue-message: 'Closed due to inactivity. Feel free to reopen if needed.'
          stale-issue-label: 'stale'
          remove-stale-when-updated: true
          days-before-pr-stale: -1
          days-before-pr-close: -1
